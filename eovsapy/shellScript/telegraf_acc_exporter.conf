# Scrape the local ACC exporter and forward entity-oriented telemetry to
# InfluxDB 2.x on pipeline.

[[inputs.http]]
  urls = ["http://127.0.0.1:9108/telegraf"]
  method = "GET"
  interval = "1s"
  timeout = "5s"
  data_format = "influx"

[[outputs.influxdb_v2]]
  urls = ["http://127.0.0.1:8086"]
  token = "$EOVSA_INFLUX_TOKEN"
  organization = "eovsa"
  bucket = "stateframe"
